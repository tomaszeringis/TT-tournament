version: '3.8'

services:
  web:
    build: .
    ports:
      - "8501:8501"
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/tournament.db
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
    command: >
      sh -c "python -m alembic upgrade head &&
             streamlit run tournament_platform/app/main.py --server.port=8501 --server.address=0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/tournament.db
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn tournament_platform.api.server:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
